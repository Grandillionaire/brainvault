<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrainVault Clipper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #e5e5e5;
    }

    .container {
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2a2a2a;
    }

    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 18px;
    }

    .header-text h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .header-text p {
      font-size: 11px;
      color: #888;
    }

    .form-group {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #888;
      margin-bottom: 4px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px 12px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #e5e5e5;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #6366f1;
    }

    textarea {
      resize: vertical;
      min-height: 80px;
      font-family: inherit;
    }

    .tags-input {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 8px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      min-height: 40px;
    }

    .tag {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      background: #6366f1;
      border-radius: 4px;
      font-size: 11px;
    }

    .tag button {
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      padding: 0;
      font-size: 14px;
      line-height: 1;
    }

    .tags-input input {
      flex: 1;
      min-width: 80px;
      border: none;
      padding: 4px;
      background: transparent;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .btn-secondary {
      background: #2a2a2a;
      color: #e5e5e5;
      margin-top: 8px;
    }

    .btn-secondary:hover {
      background: #3a3a3a;
    }

    .status {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      font-size: 12px;
      text-align: center;
    }

    .status.success {
      background: #22543d;
      color: #9ae6b4;
    }

    .status.error {
      background: #742a2a;
      color: #feb2b2;
    }

    .preview {
      margin-top: 12px;
      padding: 12px;
      background: #1a1a1a;
      border-radius: 8px;
      font-size: 12px;
      max-height: 120px;
      overflow-y: auto;
    }

    .preview-label {
      font-size: 11px;
      color: #666;
      margin-bottom: 6px;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .checkbox-group input[type="checkbox"] {
      width: auto;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">B</div>
      <div class="header-text">
        <h1>BrainVault Clipper</h1>
        <p id="pageUrl">Loading...</p>
      </div>
    </div>

    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" placeholder="Note title">
    </div>

    <div class="form-group">
      <label>Tags</label>
      <div class="tags-input" id="tagsContainer">
        <input type="text" id="tagInput" placeholder="Add tags...">
      </div>
    </div>

    <div class="form-group">
      <label for="notes">Notes</label>
      <textarea id="notes" placeholder="Add your notes..."></textarea>
    </div>

    <div class="form-group">
      <div class="checkbox-group">
        <input type="checkbox" id="includeSelection">
        <label for="includeSelection" style="margin: 0;">Include selected text</label>
      </div>
    </div>

    <button class="btn btn-primary" id="saveBtn">Save to BrainVault</button>
    <button class="btn btn-secondary" id="copyBtn">Copy to Clipboard</button>

    <div id="status"></div>
    <div class="preview" id="preview" style="display: none;">
      <div class="preview-label">Preview:</div>
      <div id="previewContent"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
